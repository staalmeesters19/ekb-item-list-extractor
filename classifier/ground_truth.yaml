# Ground truth - manually verified item list page ranges per test PDF.
# Page numbers are 1-indexed (as pdfplumber reports them).
# Expected "pages" is [start, end] inclusive.

pdf_dir: "../data"

fixtures:
  - pdf: "126-0053 Cabinet Lineator Controller.pdf"
    total_pages: 37
    expected:
      - pages: [33, 35]
        title: "ITEM LIST"
        approx_row_count: 76

  - pdf: "9263111 ILCU REV-V1.0 20-02-2024.pdf"
